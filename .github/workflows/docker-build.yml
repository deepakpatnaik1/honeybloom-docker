name: Build and Push Docker Images
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-flux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          file: Dockerfile.honeybloom-flux
          push: true
          tags: budaeytri/comfyui-flux:v2
          platforms: linux/amd64
          no-cache: true

  build-wan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          file: Dockerfile.honeybloom-wan
          push: true
          tags: budaeytri/comfyui-wan:v3
          platforms: linux/amd64
          no-cache: true

  build-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          file: Dockerfile.honeybloom-dataset
          push: true
          tags: budaeytri/comfyui-dataset:v1
          platforms: linux/amd64
          no-cache: true

  build-training:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          file: Dockerfile.honeybloom-training
          push: true
          tags: budaeytri/comfyui-training:v1
          platforms: linux/amd64
          no-cache: true
